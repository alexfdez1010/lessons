name: Deploy (Vercel prebuilt)

# Why this exists: the production build (900+ MDX pages × 256 React islands) needs
# ~7.6 GB of heap to render without OOM, which overflows Vercel's 8 GB *hobby*
# build container (it SIGKILLs at the container limit, or V8 dies with
# "Ineffective mark-compacts" if the heap cap is set lower). So we build on a
# 16 GB GitHub-hosted runner instead and ship the prebuilt output to Vercel with
# `vercel deploy --prebuilt`. Vercel's own git build is disabled
# (commandForIgnoringBuildStep="exit 0") so it no longer tries — and fails — to
# build on push.
#
# Required repo secret: VERCEL_TOKEN (a Vercel access token).
# VERCEL_ORG_ID / VERCEL_PROJECT_ID below are non-secret identifiers.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: team_6BA1aIW4AwMrjYUHWWAoqA3E
  VERCEL_PROJECT_ID: prj_7UDJ4RjJhlfBtaouvPuywkJOk0LX

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.12'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build (16 GB runner)
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy prebuilt to production
        run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
